<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>デジタルデトックス Digest｜まとめニュース速報</title>
  <meta name="description" content="はちま起稿・俺的ゲーム速報などの人気まとめサイトから話題をまとめて表示。デジタルデトックス中でも要点をサクッと把握。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Background particles -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🌿</span>
        <div class="logo-text">
          <span class="logo-title">Detox Digest</span>
          <span class="logo-sub">まとめニュース速報</span>
        </div>
      </div>
      <div class="header-actions">
        <div class="last-updated" id="lastUpdated">--</div>
        <button class="btn-refresh" id="btnRefresh" title="更新">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          更新
        </button>
        <div class="auto-refresh-toggle">
          <label class="toggle-label" for="autoRefresh">自動更新</label>
          <label class="toggle-switch">
            <input type="checkbox" id="autoRefresh" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>
  </header>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stats-bar-inner">
      <div class="stat-item">
        <span class="stat-value" id="totalArticles">0</span>
        <span class="stat-label">記事</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="sitesCount">0</span>
        <span class="stat-label">サイト</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item" id="digestModeToggle">
        <button class="digest-btn" id="btnDigestMode">
          <span class="digest-icon">⚡</span>
          ダイジェストモード
        </button>
      </div>
    </div>
  </div>

  <!-- Site filter tabs -->
  <nav class="site-tabs" id="siteTabs">
    <div class="tabs-inner">
      <button class="tab-btn active" data-site="all" id="tab-all">
        <span class="tab-dot" style="background: linear-gradient(135deg, #a78bfa, #60a5fa)"></span>
        すべて
      </button>
      <!-- Dynamic tabs inserted here -->
    </div>
  </nav>

  <!-- Main content -->
  <main class="main">
    <!-- Loading state -->
    <div class="loading-state" id="loadingState">
      <div class="loading-spinner"></div>
      <p class="loading-text">まとめサイトからデータを取得中...</p>
      <p class="loading-sub">少々お待ちください</p>
    </div>

    <!-- Error state -->
    <div class="error-state hidden" id="errorState">
      <div class="error-icon">⚠️</div>
      <p class="error-text">データの取得に失敗しました</p>
      <p class="error-sub">ネットワーク接続を確認して再度お試しください</p>
      <button class="btn-retry" id="btnRetry">再試行</button>
    </div>

    <!-- Articles grid -->
    <div class="articles-grid hidden" id="articlesGrid">
      <!-- Cards injected here -->
    </div>

    <!-- Empty state -->
    <div class="empty-state hidden" id="emptyState">
      <div class="empty-icon">📭</div>
      <p class="empty-text">表示できる記事がありません</p>
    </div>
  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
